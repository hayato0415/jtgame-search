<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 選股清單｜ASURADA Stock Radar</title>
  <link rel="stylesheet" href="./assets/css/base.css">
  <link rel="stylesheet" href="./assets/css/layout.css">
  <link rel="stylesheet" href="./assets/css/components.css">
  <link rel="stylesheet" href="./assets/css/radar.css">
</head>
<body data-page="radar">
  <header class="app-header">
    <div class="brand-block">
      <a class="brand-title" href="./index.html">ASURADA Stock Radar</a>
      <span class="brand-subtitle">AI 台股決策雷達</span>
    </div>
    <nav class="site-nav" aria-label="主要導覽">
      <a href="./index.html">市場總覽</a>
      <a class="active" href="./radar.html">AI 選股清單</a>
      <a href="./factor-score.html">多因子評分</a>
      <a href="./news.html">重點新聞雷達</a>
      <a href="./themes.html">題材資金輪動</a>
      <a href="./stock.html">個股 AI 分析</a>
      <a href="./backtest.html">追蹤驗證</a>
      <a href="./data-status.html">資料更新狀態</a>
    </nav>
  </header>

  <main class="page-shell">
    <section class="page-title-row">
      <div>
        <p class="eyebrow">AI Stock Screener</p>
        <h1>AI 選股清單</h1>
      </div>
      <div class="title-actions"><span id="radarUpdatedAt" class="meta-pill">讀取中</span><a class="link-button" href="./factor-score.html">查看多因子評分</a></div>
    </section>

    <section class="panel filter-panel">
      <div class="filter-grid">
        <label>
          搜尋股票代號 / 名稱
          <input id="stockSearch" type="search" placeholder="例如 2330 或 台積電">
        </label>
        <label>
          題材篩選
          <select id="themeFilter"></select>
        </label>
        <label>
          型態篩選
          <select id="patternFilter"></select>
        </label>
        <label>
          分數篩選
          <select id="scoreFilter">
            <option value="0">全部分數</option>
            <option value="90">90 分以上</option>
            <option value="80">80 分以上</option>
            <option value="70">70 分以上</option>
          </select>
        </label>
        <label>
          風險篩選
          <select id="riskFilter"></select>
        </label>
      </div>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <p class="eyebrow">Score Ranking</p>
          <h2>AI 分數排序表</h2>
        </div>
        <span id="radarCount" class="meta-pill">0 檔</span>
      </div>
      <div class="table-wrap">
        <table class="data-table radar-table">
          <thead>
            <tr>
              <th>排名</th>
              <th>股票</th>
              <th>題材</th>
              <th>型態</th>
              <th>AI 分數</th>
              <th>技術</th>
              <th>籌碼</th>
              <th>基本面</th>
              <th>消息</th>
              <th>風險</th>
              <th>入選理由</th>
            </tr>
          </thead>
          <tbody id="radarTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    本網站內容僅供研究與資訊整理使用，不構成任何投資建議、買賣建議或獲利保證。
  </footer>

  <script type="module" src="./assets/js/radar-page.js"></script>
</body>
</html>
