name: Full Site Update

on:
  workflow_dispatch:
  schedule:
    # Hourly full-site refresh. News timestamps must come from source content,
    # not from the scheduled run time.
    - cron: "0 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: full-site-update
  cancel-in-progress: true

env:
  TZ: Asia/Taipei

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Full site update
        run: python scripts/update_all.py --mode full

      - name: Validate site build
        run: |
          python scripts/validate_site_build.py
          test -f docs/index.html
          test -f docs/radar.html
          test -f docs/news.html
          test -f docs/concepts.html
          test -f docs/data/site-version.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
