name: Update Processed Data

on:
  workflow_dispatch:
  schedule:
    # Asia/Taipei 14:45, 19:10
    - cron: "45 6 * * 1-5"
    - cron: "10 11 * * 1-5"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Update stock metrics
        run: python scripts/update_stock_metrics.py

      - name: Commit processed data
        run: |
          if git diff --quiet -- data/processed/stock_metrics_daily.json data/processed/update_log.json; then
            echo "No stock metrics changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/processed/stock_metrics_daily.json data/processed/update_log.json
            git commit -m "Update stock metrics data"
            git push
          fi
